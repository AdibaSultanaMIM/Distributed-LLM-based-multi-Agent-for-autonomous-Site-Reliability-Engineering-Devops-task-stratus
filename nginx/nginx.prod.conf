# Production Nginx Configuration for LLM API Rate Limiting
# Higher limits and more aggressive settings for production use

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format rate_limit '$remote_addr - [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         'rt=$request_time uct="$upstream_connect_time" '
                         'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Production rate limiting zones - more permissive
    limit_req_zone $binary_remote_addr zone=llm_req_limit:20m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=llm_conn_limit:20m;
    
    # Status zone for metrics
    limit_req_status 429;
    limit_conn_status 429;

    # Upstream with connection pooling
    upstream openai_backend {
        server api.openai.com:443;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    upstream azure_openai_backend {
        server $AZURE_OPENAI_ENDPOINT:443;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    upstream anthropic_backend {
        server api.anthropic.com:443;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    # OpenAI proxy with production settings
    server {
        listen 8080;
        server_name openai-proxy;

        access_log /var/log/nginx/openai_access.log rate_limit buffer=32k flush=5s;
        error_log /var/log/nginx/openai_error.log warn;

        # Production rate limits: 30 req/min with larger burst
        limit_req zone=llm_req_limit burst=15 delay=10;
        limit_conn llm_conn_limit 20;

        add_header X-RateLimit-Limit "30/minute" always;
        add_header X-RateLimit-Burst "15" always;

        location / {
            proxy_pass https://api.openai.com;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_ssl_session_reuse on;
            
            proxy_set_header Host api.openai.com;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Connection "";
            
            proxy_http_version 1.1;
            proxy_buffering off;
            
            # Production timeouts
            proxy_connect_timeout 90s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            # Connection pooling
            proxy_socket_keepalive on;
            
            proxy_intercept_errors on;
            error_page 429 = @rate_limited;
        }

        location @rate_limited {
            default_type application/json;
            add_header Retry-After 60 always;
            return 429 '{"error": {"message": "Rate limit exceeded. Please retry after 60 seconds.", "type": "rate_limit_error", "code": "rate_limit_exceeded", "retry_after": 60}}';
        }
    }

    # Azure OpenAI proxy
    server {
        listen 8081;
        server_name azure-openai-proxy;

        access_log /var/log/nginx/azure_openai_access.log rate_limit buffer=32k flush=5s;
        error_log /var/log/nginx/azure_openai_error.log warn;

        limit_req zone=llm_req_limit burst=15 delay=10;
        limit_conn llm_conn_limit 20;

        add_header X-RateLimit-Limit "30/minute" always;
        add_header X-RateLimit-Burst "15" always;

        location / {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 10s;
            
            proxy_pass https://$http_x_azure_endpoint$request_uri;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_ssl_session_reuse on;
            
            proxy_set_header Host $http_x_azure_host;
            proxy_set_header api-key $http_api_key;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Connection "";
            
            proxy_http_version 1.1;
            proxy_buffering off;
            
            proxy_connect_timeout 90s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            proxy_socket_keepalive on;
            
            proxy_intercept_errors on;
            error_page 429 = @rate_limited;
        }

        location @rate_limited {
            default_type application/json;
            add_header Retry-After 60 always;
            return 429 '{"error": {"message": "Rate limit exceeded. Please retry after 60 seconds.", "type": "rate_limit_error", "code": "rate_limit_exceeded", "retry_after": 60}}';
        }
    }

    # Anthropic proxy
    server {
        listen 8082;
        server_name anthropic-proxy;

        access_log /var/log/nginx/anthropic_access.log rate_limit buffer=32k flush=5s;
        error_log /var/log/nginx/anthropic_error.log warn;

        limit_req zone=llm_req_limit burst=15 delay=10;
        limit_conn llm_conn_limit 20;

        add_header X-RateLimit-Limit "30/minute" always;
        add_header X-RateLimit-Burst "15" always;

        location / {
            proxy_pass https://api.anthropic.com;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_ssl_session_reuse on;
            
            proxy_set_header Host api.anthropic.com;
            proxy_set_header x-api-key $http_x_api_key;
            proxy_set_header anthropic-version $http_anthropic_version;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Connection "";
            
            proxy_http_version 1.1;
            proxy_buffering off;
            
            proxy_connect_timeout 90s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            proxy_socket_keepalive on;
            
            proxy_intercept_errors on;
            error_page 429 = @rate_limited;
        }

        location @rate_limited {
            default_type application/json;
            add_header Retry-After 60 always;
            return 429 '{"error": {"message": "Rate limit exceeded. Please retry after 60 seconds.", "type": "rate_limit_error", "code": "rate_limit_exceeded", "retry_after": 60}}';
        }
    }

    # Health check and monitoring
    server {
        listen 8888;
        server_name health;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker networks
            deny all;
        }

        location /metrics {
            # Placeholder for Prometheus metrics exporter
            # Install nginx-prometheus-exporter for production metrics
            access_log off;
            return 501 "Metrics endpoint not configured\n";
            add_header Content-Type text/plain;
        }
    }
}
