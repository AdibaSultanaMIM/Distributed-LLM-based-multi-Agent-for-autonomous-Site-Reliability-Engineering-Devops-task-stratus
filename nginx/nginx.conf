# Nginx configuration for LLM API rate limiting
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Define rate limiting zones
    # Zone for request rate limiting: 10 requests per minute
    limit_req_zone $binary_remote_addr zone=llm_req_limit:10m rate=10r/m;
    
    # Zone for connection limiting
    limit_conn_zone $binary_remote_addr zone=llm_conn_limit:10m;
    
    # Custom log format to track rate limiting
    log_format rate_limit '$remote_addr - [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         'rt=$request_time uct="$upstream_connect_time" '
                         'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Upstream servers for different LLM providers
    upstream openai_backend {
        server api.openai.com:443;
        keepalive 10;
    }

    upstream azure_openai_backend {
        server $AZURE_OPENAI_ENDPOINT:443;
        keepalive 10;
    }

    upstream anthropic_backend {
        server api.anthropic.com:443;
        keepalive 10;
    }

    # Server block for OpenAI API
    server {
        listen 8080;
        server_name openai-proxy;

        access_log /var/log/nginx/openai_access.log rate_limit;
        error_log /var/log/nginx/openai_error.log;

        # Apply rate limiting
        limit_req zone=llm_req_limit burst=5 delay=3;
        limit_req_status 429;
        limit_conn llm_conn_limit 10;

        # Add custom headers for rate limit info
        add_header X-RateLimit-Limit "10/minute" always;
        add_header X-RateLimit-Burst "5" always;

        location / {
            proxy_pass https://api.openai.com;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            
            # Preserve original headers
            proxy_set_header Host api.openai.com;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Type $http_content_type;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Handle 429 responses
            proxy_intercept_errors on;
            error_page 429 = @rate_limited;
        }

        location @rate_limited {
            default_type application/json;
            return 429 '{"error": {"message": "Rate limit exceeded. Please wait before making another request.", "type": "rate_limit_error", "code": "rate_limit_exceeded"}}';
        }
    }

    # Server block for Azure OpenAI API
    server {
        listen 8081;
        server_name azure-openai-proxy;

        access_log /var/log/nginx/azure_openai_access.log rate_limit;
        error_log /var/log/nginx/azure_openai_error.log;

        # Apply rate limiting
        limit_req zone=llm_req_limit burst=5 delay=3;
        limit_req_status 429;
        limit_conn llm_conn_limit 10;

        add_header X-RateLimit-Limit "10/minute" always;
        add_header X-RateLimit-Burst "5" always;

        location / {
            # This will be configured via environment variable
            resolver 8.8.8.8 valid=300s;
            resolver_timeout 5s;
            
            proxy_pass https://$http_x_azure_endpoint$request_uri;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            
            proxy_set_header Host $http_x_azure_host;
            proxy_set_header api-key $http_api_key;
            proxy_set_header Content-Type $http_content_type;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            proxy_intercept_errors on;
            error_page 429 = @rate_limited;
        }

        location @rate_limited {
            default_type application/json;
            return 429 '{"error": {"message": "Rate limit exceeded. Please wait before making another request.", "type": "rate_limit_error", "code": "rate_limit_exceeded"}}';
        }
    }

    # Server block for Anthropic API
    server {
        listen 8082;
        server_name anthropic-proxy;

        access_log /var/log/nginx/anthropic_access.log rate_limit;
        error_log /var/log/nginx/anthropic_error.log;

        # Apply rate limiting
        limit_req zone=llm_req_limit burst=5 delay=3;
        limit_req_status 429;
        limit_conn llm_conn_limit 10;

        add_header X-RateLimit-Limit "10/minute" always;
        add_header X-RateLimit-Burst "5" always;

        location / {
            proxy_pass https://api.anthropic.com;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            
            proxy_set_header Host api.anthropic.com;
            proxy_set_header x-api-key $http_x_api_key;
            proxy_set_header anthropic-version $http_anthropic_version;
            proxy_set_header Content-Type $http_content_type;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            proxy_intercept_errors on;
            error_page 429 = @rate_limited;
        }

        location @rate_limited {
            default_type application/json;
            return 429 '{"error": {"message": "Rate limit exceeded. Please wait before making another request.", "type": "rate_limit_error", "code": "rate_limit_exceeded"}}';
        }
    }

    # Health check endpoint
    server {
        listen 8888;
        server_name health;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
}
